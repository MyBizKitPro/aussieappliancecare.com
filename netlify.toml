# Netlify config — static site, no build step.
# (Netlify still auto-installs package.json deps and bundles the function below.)
[build]
  publish = "."
  functions = "netlify/functions"

# Sensible default headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Always revalidate images so a swapped photo (same filename) shows up
# right away instead of being served stale from the browser cache.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
